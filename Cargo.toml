[package]
name = "ollama-forge"
version = "0.1.0"
edition = "2021"
authors = ["Ollama-Forge Team"]
description = "The 'Everything' Framework for Local Coding Agents"
license = "MIT"
repository = "https://github.com/ollama-forge/ollama-forge"
homepage = "https://ollama-forge.ai"
keywords = ["ollama", "llm", "cli", "agent", "coding"]
rust-version = "1.75.0"

[[bin]]
name = "forge"
path = "src/main.rs"

[lib]
name = "ollama_forge"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1.35", features = ["full", "tracing"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.4", features = ["derive", "cargo", "wrap_help"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
async-trait = "0.1"
futures = "0.3"
indicatif = { version = "0.17", features = ["tokio"] }
sysinfo = "0.30"
serde_yaml = "0.9"
dirs = "5.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
regex = "1.10"
once_cell = "1.19"
parking_lot = "0.12"
tempfile = "3.8"
infer = "0.15"
walkdir = "2.4"
tokio-util = { version = "0.7", features = ["codec", "io"] }
async-stream = "0.3"

[dev-dependencies]
tempfile = "3.8"
wiremock = "0.5"
criterion = "0.5"
proptest = "1.4"
mockall = "0.12"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0

[features]
default = ["color"]
color = ["clap/color"]
