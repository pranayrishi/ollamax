[forge]
version = "1.0"

[ollama]
url = "http://127.0.0.1:11434"
default_model = "qwen3.5:4b"
planning_model = "deepseek-r1:8b"
execution_models = [
    "qwen3.5:4b",
    "deepseek-r1:8b",
    "qwen3.5:9b",
    "gemma4:12b"
]

[execution]
parallel_workers = 4
max_context_tokens = 32768

[security]
enabled = true
scan_secrets = true
scan_vulnerabilities = true
dangerous_command_check = true

[tdd]
enforced = true
min_coverage = 80

[optimization]
auto_tune = true
auto_unload_models = true
min_free_vram_mb = 2048

[router]
simple_threshold = 0.3
medium_threshold = 0.6
complex_threshold = 0.8
