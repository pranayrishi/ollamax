<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self'; script-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="cursor-buddy.css" rel="stylesheet" />
  <title>Ollamax local status</title>
</head>
<body>
  <span id="target-cue" class="target-cue" aria-hidden="true" hidden></span>
  <div id="buddy" role="status" aria-live="polite" aria-atomic="true" hidden>
    <span class="indicator" aria-hidden="true"></span>
    <span class="copy"><strong id="label"></strong><span id="detail"></span></span>
  </div>
  <script src="cursor-buddy.js"></script>
</body>
</html>
