<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; connect-src http://127.0.0.1:* http://localhost:*;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="theme.css" rel="stylesheet" />
  <link href="main.css" rel="stylesheet" />
  <link href="hub.css" rel="stylesheet" />
  <link href="xterm.css" rel="stylesheet" />
  <title>Ollamax</title>
</head>
<body>
  <div id="shell">
    <!-- Left rail: icon navigation (Hermes-style) -->
    <nav id="rail" aria-label="Sections">
      <button class="rail-btn active" data-view="chat" title="Chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </button>
      <button class="rail-btn" data-view="hub" title="Skills & Models">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
      </button>
      <button class="rail-btn" data-view="ide" title="Files & Editor">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
          <polyline points="13 2 13 9 20 9"></polyline>
        </svg>
      </button>
    </nav>

    <div id="views">
      <!-- ============ CHAT VIEW ============ -->
      <section id="chat-view">
        <header id="topbar">
          <div class="modes" role="tablist">
            <button class="mode active" data-mode="agent" title="Autonomous agent — edits files with your approval">Agent</button>
            <button class="mode" data-mode="team" title="Multi-scout team — read-only scouts, one writer, verification">Team</button>
            <button class="mode" data-mode="chat" title="Quick Q&A — read-only, nothing changes in your workspace">Ask</button>
            <button class="mode" data-mode="build" title="Parallel multi-model code build">Build</button>
          </div>
        </header>

        <div id="statusline" class="statusline">Starting local engine...</div>
        <div id="modelhint" class="modelhint" hidden></div>
        <div id="account" class="account" hidden></div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div id="queue" class="queue" hidden></div>
        <div id="context" class="context" hidden></div>

        <footer id="composer">
          <div class="modelrow">
            <select id="autonomy" title="Autonomy — how much the agent does before asking">
              <option value="confirm">Confirm each action</option>
              <option value="auto">Act autonomously</option>
              <option value="readonly">Read-only (no writes)</option>
            </select>
            <select id="model" title="Model (Auto picks the best for each task)"></select>
            <button id="refresh" class="iconbtn" title="Refresh installed models">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
              </svg>
            </button>
          </div>
          <div class="attachrow">
            <button class="attach" data-attach="pick" title="Attach files for context">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
              </svg>
              Files
            </button>
            <button class="attach" data-attach="image" title="Attach an image (needs vision model)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
              Image
            </button>
            <button id="spatial-select" class="attach" type="button" title="Select a screen region">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 3l-2 2v5h5"></path>
                <path d="M19 3l2 2v5h-5"></path>
                <path d="M5 21l-2-2v-5h5"></path>
                <path d="M19 21l2-2v-5h-5"></path>
              </svg>
              Region
            </button>
            <div class="attach-divider"></div>
            <button id="voice-push-to-talk" class="voice-control" type="button" aria-pressed="false" title="Hold to record voice command">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
              </svg>
              Voice
            </button>
            <label class="voice-option" title="Release-to-send keeps approval requirements">
              <input id="voice-send-after" type="checkbox" checked /> Auto-send
            </label>
            <label class="voice-option" title="Speak responses with local TTS">
              <input id="voice-speak-answers" type="checkbox" /> Speak
            </label>
            <label id="team-parallel-option" class="voice-option" hidden title="Run scouts in parallel">
              <input id="team-parallel-scouts" type="checkbox" /> Parallel scouts
            </label>
          </div>
          <div id="voice-status" class="voice-status" aria-live="polite"></div>
          <div class="inputrow">
            <textarea id="input" rows="1" placeholder="Ask anything — or describe a task for the agent..."></textarea>
            <button id="send" class="send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
            <button id="stop" class="stop" hidden>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <rect x="4" y="4" width="16" height="16" rx="2"></rect>
              </svg>
            </button>
          </div>
        </footer>
      </section>

      <!-- ============ IDE WORKSPACE VIEW ============ -->
      <section id="ide-view" hidden>
        <div class="ide-toolbar">
          <button id="open-folder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            Open Folder...
          </button>
          <span id="workspace-name" class="ws-name"></span>
          <span id="ide-status" class="ide-status"></span>
        </div>
        <div class="ide-body">
          <aside id="ide-sidebar"><ul id="file-tree" class="file-tree"></ul></aside>
          <div class="ide-main">
            <div id="editor-tabs" class="editor-tabs"></div>
            <div id="editor-host" class="editor-host"></div>
            <div id="editor-hint" class="editor-hint"></div>
          </div>
        </div>
        <div id="terminal-panel" class="terminal-panel"><div id="terminal-host"></div></div>
      </section>

      <!-- ============ HUB VIEW ============ -->
      <section id="hub-view" hidden>
        <header class="hub-top">
          <input id="search" type="search" placeholder="Search skills and models..." />
        </header>
        <div id="status" class="hub-status"></div>
        <div id="grid" class="hub-grid"></div>
        <div id="detail" class="hub-detail" hidden></div>
      </section>
    </div>
  </div>

  <script src="vscode-shim.js"></script>
  <script src="bridge.js"></script>
  <script src="point-directives.js"></script>
  <script src="desktop-points.js"></script>
  <script src="desktop-voice.js"></script>
  <script src="desktop-spatial.js"></script>
  <script src="hub-bridge.js"></script>
  <script src="app-shell.js"></script>
  <script src="ide.js"></script>
  <script src="main.js"></script>
  <script src="hub.js"></script>
</body>
</html>
