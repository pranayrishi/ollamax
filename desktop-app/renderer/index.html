<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- App CSP: the renderer talks ONLY to the local engine over fetch (the Hub
       reaches the account server via the main process over IPC, not fetch, so no
       remote connect-src is needed). Scripts are local files; no inline. -->
  <!-- worker-src/blob: for Monaco's editor web workers; child-src for the same. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; connect-src http://127.0.0.1:* http://localhost:*;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="theme.css" rel="stylesheet" />
  <link href="main.css" rel="stylesheet" />
  <link href="hub.css" rel="stylesheet" />
  <link href="xterm.css" rel="stylesheet" />
  <title>Ollama-Forge</title>
</head>
<body>
  <div id="shell">
    <!-- Left rail: switch between Chat and the Central Hub (separate panels). -->
    <nav id="rail" aria-label="Sections">
      <button class="rail-btn active" data-view="chat" title="Ask / Agent / Team / Build">💬</button>
      <button class="rail-btn" data-view="hub" title="Central Hub — domain packages">🧩</button>
      <button class="rail-btn" data-view="ide" title="Editor — files + terminal">📁</button>
    </nav>

    <div id="views">
      <!-- ============ CHAT VIEW (reused media/main.js) ============ -->
      <section id="chat-view">
        <header id="topbar">
          <div class="modes" role="tablist">
            <button class="mode active" data-mode="agent" title="Autonomous agent — inspects the opened workspace and edits files with your approval">Agent</button>
            <button class="mode" data-mode="team" title="Controlled local team — read-only scouts, one writer, verification, and review">Team</button>
            <button class="mode" data-mode="chat" title="Quick local Q&A — read-only, nothing changes in your workspace">Ask</button>
            <button class="mode" data-mode="build" title="Parallel multi-model code build/orchestration">Build</button>
          </div>
        </header>

        <div id="statusline" class="statusline">starting local engine…</div>
        <div id="modelhint" class="modelhint" hidden></div>
        <div id="account" class="account" hidden></div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div id="queue" class="queue" hidden></div>
        <div id="context" class="context" hidden></div>

        <footer id="composer">
          <!-- #6: model/router picker directly above the input. Auto = default. -->
          <div class="modelrow">
            <select id="autonomy" title="Autonomy Dial — how much the agent does before asking you">
              <option value="confirm">Confirm each action</option>
              <option value="auto">Act autonomously</option>
              <option value="readonly">Read-only (no writes)</option>
            </select>
            <select id="model" title="Model / router (Auto = pick the best installed model for this task)"></select>
            <button id="refresh" class="iconbtn" title="Refresh installed Ollama models (after ollama pull)">⟳</button>
          </div>
          <div class="attachrow">
            <button class="attach" data-attach="pick" title="Attach files for context">+ files</button>
            <button class="attach" data-attach="image" title="Attach an image (needs a vision-capable model)">+ image</button>
            <button id="spatial-select" class="attach" type="button" title="Explicitly select a screen region to attach as local visual context">⌁ region</button>
            <button id="voice-push-to-talk" class="voice-control" type="button" aria-pressed="false" title="Hold to record a local voice command with whisper.cpp">🎙 Hold to talk</button>
            <label class="voice-option" title="Release-to-send keeps normal Agent approval requirements in effect"><input id="voice-send-after" type="checkbox" checked /> Send voice command</label>
            <label class="voice-option" title="Speak completed responses with an on-device voice"><input id="voice-speak-answers" type="checkbox" /> Speak answers</label>
            <label id="team-parallel-option" class="voice-option" hidden title="Runs only the two read-only scout roles in parallel when your local hardware configuration permits it. The writer remains single-file and approval-gated."><input id="team-parallel-scouts" type="checkbox" /> Parallel scouts</label>
          </div>
          <div id="voice-status" class="voice-status" aria-live="polite"></div>
          <div class="inputrow">
            <textarea id="input" rows="3" placeholder="Open a folder, then tell the agent what to change — it asks before edits. ⏎ to send, ⇧⏎ for newline."></textarea>
            <div class="btns">
              <button id="send" class="send">Send</button>
              <button id="stop" class="stop" hidden>Stop</button>
            </div>
          </div>
        </footer>
      </section>

      <!-- ============ IDE WORKSPACE VIEW (#3) ============ -->
      <section id="ide-view" hidden>
        <div class="ide-toolbar">
          <button id="open-folder">Open Folder…</button>
          <span id="workspace-name" class="ws-name"></span>
          <span id="ide-status" class="ide-status"></span>
        </div>
        <div class="ide-body">
          <aside id="ide-sidebar"><ul id="file-tree" class="file-tree"></ul></aside>
          <div class="ide-main">
            <div id="editor-tabs" class="editor-tabs"></div>
            <div id="editor-host" class="editor-host"></div>
            <div id="editor-hint" class="editor-hint"></div>
          </div>
        </div>
        <div id="terminal-panel" class="terminal-panel"><div id="terminal-host"></div></div>
      </section>

      <!-- ============ CENTRAL HUB VIEW (reused media/hub.js) ============ -->
      <section id="hub-view" hidden>
        <header class="hub-top">
          <input id="search" type="search" placeholder="Search domains…" />
        </header>
        <div id="status" class="hub-status"></div>
        <div id="grid" class="hub-grid"></div>
        <div id="detail" class="hub-detail" hidden></div>
      </section>
    </div>
  </div>

  <!-- Order: shim defines acquireVsCodeApi() + the multi-bridge dispatcher;
       the two bridges register; app-shell wires the rail; then the REUSED UIs
       run unchanged on top. -->
  <script src="vscode-shim.js"></script>
  <script src="bridge.js"></script>
  <script src="point-directives.js"></script>
  <script src="desktop-points.js"></script>
  <script src="desktop-voice.js"></script>
  <script src="desktop-spatial.js"></script>
  <script src="hub-bridge.js"></script>
  <script src="app-shell.js"></script>
  <script src="ide.js"></script>
  <script src="main.js"></script>
  <script src="hub.js"></script>
</body>
</html>
