name: release-app

# Builds the STANDALONE desktop app (Electron shell around the forge engine,
# modeled on the Sattva AI app) and attaches UNSIGNED installers to a *draft*
# release in the public releases repo. A later `v*` source release verifies the
# complete cross-platform asset set and publishes that draft atomically. A
# manual run is build-only so it cannot attach artifacts to an unintended tag.
#
# Unsigned (ad-hoc, Sattva-style) this round — see desktop-app/scripts/afterPack.js
# and the report. Signing + notarization is the future paid step.
#
# Requires the same RELEASES_REPO_TOKEN secret as release.yml (cross-repo publish).
# Each native runner attaches its verified installers directly to the draft.
# This avoids intermediate Actions artifact storage, which is independently
# quota-limited and must not block an otherwise valid public release.

on:
  push:
    tags: ["app-v*"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RELEASES_REPO: pranayrishi/ollamax-releases
  # The tag is asserted against this commit after checkout so a moved tag or a
  # different upstream revision cannot silently change a public installer.
  WHISPER_CPP_VERSION: v1.9.1
  WHISPER_CPP_COMMIT: f049fff95a089aa9969deb009cdd4892b3e74916
  WHISPER_MODEL_URL: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin

jobs:
  prepare-public-release:
    name: prepare public release
    runs-on: ubuntu-latest
    outputs:
      source_commit: ${{ steps.provenance.outputs.source_commit }}
      provenance_marker: ${{ steps.provenance.outputs.marker }}
    steps:
      # Pin the build to the immutable event SHA, then independently resolve
      # the live tag. A later force-push of app-v* must fail rather than let a
      # runner package a different revision under the same public version.
      - uses: actions/checkout@v4
        if: startsWith(github.ref, 'refs/tags/app-v')
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Assert app tag is pinned to this event commit
        id: provenance
        if: startsWith(github.ref, 'refs/tags/app-v')
        shell: bash
        run: |
          set -euo pipefail
          event_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          checked_commit="$(git rev-parse HEAD^{commit})"
          [[ "$checked_commit" == "$event_commit" ]] || {
            echo "checkout resolved $checked_commit, but this tag event resolved $event_commit" >&2
            exit 1
          }

          verify_ref="refs/ollamax-release-verify/${GITHUB_REF_NAME}"
          git fetch --no-tags --force origin "refs/tags/${GITHUB_REF_NAME}:${verify_ref}"
          tag_commit="$(git rev-parse "${verify_ref}^{commit}")"
          [[ "$tag_commit" == "$event_commit" ]] || {
            echo "${GITHUB_REF_NAME} currently resolves to $tag_commit, not this event commit $event_commit" >&2
            exit 1
          }

          marker="$(python3 - "$GITHUB_REF_NAME" "$event_commit" <<'PY'
          import json
          import sys

          payload = {
              "schema": 1,
              "app_tag": sys.argv[1],
              "source_commit": sys.argv[2],
          }
          print("<!-- ollamax-provenance " + json.dumps(payload, separators=(",", ":")) + " -->")
          PY
          )"
          printf 'source_commit=%s\n' "$event_commit" >> "$GITHUB_OUTPUT"
          printf 'marker=%s\n' "$marker" >> "$GITHUB_OUTPUT"

      # A previous Windows PowerShell invocation stripped the `app-` prefix
      # incorrectly, creating a public `app-v*` release. It is never a valid
      # download target. Never delete or reuse a base-version public release:
      # source provenance must be checked explicitly before any draft changes.
      - name: Remove stale app-prefixed public releases
        if: startsWith(github.ref, 'refs/tags/app-v')
        shell: bash
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          base_tag="${GITHUB_REF_NAME#app-}"
          api_root="https://api.github.com/repos/${RELEASES_REPO}/releases"

          fetch_release() {
            response="$(mktemp)"
            code="$(curl -sS -o "$response" -w '%{http_code}' \
              -H "Authorization: Bearer ${RELEASES_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$api_root/tags/$1")"
          }

          delete_response_release() {
            release_id="$(python3 -c 'import json, sys; print(json.load(sys.stdin).get("id", ""))' < "$response")"
            [[ "$release_id" =~ ^[0-9]+$ ]] || {
              echo "release response did not contain a numeric id" >&2
              exit 1
            }
            curl -fsS -X DELETE \
              -H "Authorization: Bearer ${RELEASES_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$api_root/${release_id}"
          }

          fetch_release "app-${base_tag}"
          case "$code" in
            404) ;;
            200) delete_response_release ;;
            *)
              echo "could not inspect app-prefixed release (HTTP $code)" >&2
              sed -n '1,80p' "$response" >&2
              exit 1
              ;;
          esac

      - name: Require a matching draft provenance record
        if: startsWith(github.ref, 'refs/tags/app-v')
        shell: bash
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          SOURCE_COMMIT: ${{ steps.provenance.outputs.source_commit }}
        run: |
          set -euo pipefail
          base_tag="${GITHUB_REF_NAME#app-}"
          list_releases() {
            response="$(mktemp)"
            printf '[]' > "$response"
            local page=1
            while :; do
              local page_response
              page_response="$(mktemp)"
              local code
              code="$(curl -sS -o "$page_response" -w '%{http_code}' \
                -H "Authorization: Bearer ${RELEASES_TOKEN}" \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "https://api.github.com/repos/${RELEASES_REPO}/releases?per_page=100&page=${page}")"
              [[ "$code" == 200 ]] || {
                echo "could not list releases for ${RELEASES_REPO}, got HTTP $code" >&2
                sed -n '1,80p' "$page_response" >&2
                exit 1
              }

              local page_count
              page_count="$(python3 - "$response" "$page_response" <<'PY'
          import json
          import sys

          target_path, page_path = sys.argv[1:]
          with open(target_path, encoding="utf-8") as handle:
              releases = json.load(handle)
          with open(page_path, encoding="utf-8") as handle:
              page = json.load(handle)
          if not isinstance(releases, list) or not isinstance(page, list):
              raise SystemExit("GitHub release listing was not an array")
          releases.extend(page)
          with open(target_path, "w", encoding="utf-8") as handle:
              json.dump(releases, handle)
          print(len(page))
          PY
              )"
              rm -f "$page_response"
              [[ "$page_count" =~ ^[0-9]+$ ]] || {
                echo "release listing returned an invalid page count" >&2
                exit 1
              }
              if (( page_count < 100 )); then
                break
              fi
              ((page += 1))
              (( page <= 1000 )) || {
                echo "refusing to scan more than 100,000 releases" >&2
                exit 1
              }
            done
          }
          list_releases

          python3 - "$response" "$base_tag" "$GITHUB_REF_NAME" "$SOURCE_COMMIT" <<'PY'
          import json
          import re
          import sys

          releases = json.load(open(sys.argv[1], encoding="utf-8"))
          tag, app_tag, source_commit = sys.argv[2:]
          matches = [release for release in releases if release.get("tag_name") == tag]
          if not matches:
              raise SystemExit(0)
          if len(matches) != 1:
              raise SystemExit(f"expected at most one base release for {tag}, found {len(matches)}")
          release = matches[0]
          if not release.get("draft"):
              raise SystemExit("refusing to modify an already-published base release")

          matches = re.findall(r"<!-- ollamax-provenance (\{[^<>]*\}) -->", release.get("body") or "")
          if len(matches) != 1:
              raise SystemExit("existing draft must contain exactly one Ollamax provenance marker")
          try:
              marker = json.loads(matches[0])
          except json.JSONDecodeError as error:
              raise SystemExit(f"existing draft has invalid provenance JSON: {error}")
          expected = {
              "schema": 1,
              "app_tag": app_tag,
              "source_commit": source_commit,
          }
          if marker != expected:
              raise SystemExit(f"existing draft provenance does not match this app tag: {marker!r}")
          PY

  build:
    name: app (${{ matrix.label }})
    needs: prepare-public-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Release updates are serialized so the three native runners never race
      # to create or update the same public GitHub Release.
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-latest
            label: linux-x64
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the tag-push event snapshot, not a tag that may move
          # while this serialized native matrix is still running.
          ref: ${{ github.sha }}

      - name: Assert the macOS artifact is built on Apple Silicon
        if: matrix.label == 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          [[ "$arch" == "arm64" ]] || {
            echo "expected an arm64 macOS runner for Ollamax-macos-arm64, got $arch" >&2
            exit 1
          }

      - name: Assert the Linux artifact is built on x64
        if: matrix.label == 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          [[ "$arch" == "x86_64" ]] || {
            echo "expected an x86_64 Linux runner for Ollamax-linux-x64, got $arch" >&2
            exit 1
          }

      - name: Build the forge engine (bundled into the app)
        uses: dtolnay/rust-toolchain@stable
      - name: Test the bundled forge engine
        run: cargo test --locked --all-targets
      - run: cargo build --release --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # A tag is the public package identity. Refuse to produce a draft whose
      # tag says one version while the bundled CLI, Electron app, or VS Code
      # panel says another.
      - name: Assert app release tag matches shipped package versions
        if: startsWith(github.ref, 'refs/tags/app-v')
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#app-v}"
          node - "$expected" <<'NODE'
          const fs = require("fs");
          const expected = process.argv[2];
          const cargo = fs.readFileSync("Cargo.toml", "utf8");
          const cargoVersion = /^\s*version\s*=\s*"([^"]+)"\s*$/m.exec(cargo)?.[1];
          const versions = {
            "Cargo.toml": cargoVersion,
            "desktop-app/package.json": JSON.parse(fs.readFileSync("desktop-app/package.json", "utf8")).version,
            "desktop-app/package-lock.json": JSON.parse(fs.readFileSync("desktop-app/package-lock.json", "utf8")).version,
            "editor-integrations/forge-vscode/package.json": JSON.parse(fs.readFileSync("editor-integrations/forge-vscode/package.json", "utf8")).version,
          };
          const mismatches = Object.entries(versions).filter(([, version]) => version !== expected);
          if (mismatches.length) {
            throw new Error(`release tag v${expected} does not match ${mismatches.map(([file, version]) => `${file}=${version ?? "missing"}`).join(", ")}`);
          }
          console.log(`verified shipped package versions: ${expected}`);
          NODE

      # node-pty (the integrated terminal) is a native module rebuilt by node-gyp.
      # The runners ship Python 3.12+, which removed `distutils` → node-gyp fails
      # ("No module named 'distutils'"). Pin Python 3.11 (still has distutils) so
      # the native rebuild succeeds on macOS/Windows.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install desktop packaging dependencies
        working-directory: desktop-app
        env:
          # `python` resolves to the pinned 3.11 on all runners (setup-python).
          npm_config_python: python
        run: npm ci

      # The checked-in manifest is intentionally unbundled. Only this
      # disposable release workspace may flip it after all three local files
      # have been built/downloaded and verified by stage-whisper-runtime.mjs.
      - name: Assert source voice manifest is intentionally unbundled
        working-directory: desktop-app
        run: >-
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('voice/manifest.json','utf8')); if (manifest?.recognition?.bundled !== false) throw new Error('source voice manifest must remain bundled:false before release staging');"

      - name: Build pinned whisper.cpp runtime (macOS/Linux)
        if: matrix.label != 'windows-x64'
        shell: bash
        run: |
          set -euo pipefail
          source_dir="${RUNNER_TEMP}/ollamax-whisper.cpp"
          rm -rf "$source_dir"
          git clone --depth 1 --branch "$WHISPER_CPP_VERSION" \
            https://github.com/ggml-org/whisper.cpp.git "$source_dir"
          actual_commit="$(git -C "$source_dir" rev-parse HEAD)"
          [[ "$actual_commit" == "$WHISPER_CPP_COMMIT" ]] || {
            echo "whisper.cpp $WHISPER_CPP_VERSION resolved to $actual_commit, expected $WHISPER_CPP_COMMIT" >&2
            exit 1
          }
          cmake -S "$source_dir" -B "$source_dir/build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build "$source_dir/build" --target whisper-cli --config Release --parallel
          cli="$source_dir/build/bin/whisper-cli"
          [[ -x "$cli" ]] || {
            echo "whisper-cli was not built as an executable" >&2
            exit 1
          }
          target_platform=linux
          if [[ "${{ matrix.label }}" == "macos-arm64" ]]; then target_platform=darwin; fi
          {
            echo "OLLAMAX_WHISPER_CLI_PATH=$cli"
            echo "OLLAMAX_WHISPER_LICENSE_PATH=$source_dir/LICENSE"
            echo "OLLAMAX_WHISPER_DLL_DIR=$(dirname "$cli")"
            echo "OLLAMAX_WHISPER_STAGE_PLATFORM=$target_platform"
          } >> "$GITHUB_ENV"

      - name: Build pinned whisper.cpp runtime (Windows x64)
        if: matrix.label == 'windows-x64'
        shell: pwsh
        run: |
          if ($env:RUNNER_ARCH -ne "X64") {
            throw "expected an X64 Windows runner for Ollamax-windows-x64, got $env:RUNNER_ARCH"
          }
          $sourceDir = Join-Path $env:RUNNER_TEMP "ollamax-whisper.cpp"
          if (Test-Path $sourceDir) { Remove-Item -Recurse -Force $sourceDir }
          git clone --depth 1 --branch $env:WHISPER_CPP_VERSION https://github.com/ggml-org/whisper.cpp.git $sourceDir
          $actualCommit = (git -C $sourceDir rev-parse HEAD).Trim()
          if ($actualCommit -ne $env:WHISPER_CPP_COMMIT) {
            throw "whisper.cpp $env:WHISPER_CPP_VERSION resolved to $actualCommit, expected $env:WHISPER_CPP_COMMIT"
          }
          cmake -S $sourceDir -B "$sourceDir/build" -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_SERVER=OFF -DBUILD_SHARED_LIBS=OFF -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build "$sourceDir/build" --target whisper-cli --config Release --parallel
          $candidates = @(Get-ChildItem -Path "$sourceDir/build" -Recurse -File -Filter "whisper-cli.exe")
          if ($candidates.Count -ne 1) {
            throw "expected exactly one whisper-cli.exe, found $($candidates.Count)"
          }
          $cli = $candidates[0].FullName
          if ((Get-Item $cli).Length -le 0) { throw "whisper-cli.exe is empty" }
          Add-Content -Path $env:GITHUB_ENV -Value "OLLAMAX_WHISPER_CLI_PATH=$cli"
          Add-Content -Path $env:GITHUB_ENV -Value "OLLAMAX_WHISPER_LICENSE_PATH=$(Join-Path $sourceDir 'LICENSE')"
          Add-Content -Path $env:GITHUB_ENV -Value "OLLAMAX_WHISPER_DLL_DIR=$(Split-Path -Parent $cli)"
          Add-Content -Path $env:GITHUB_ENV -Value "OLLAMAX_WHISPER_STAGE_PLATFORM=win32"

      - name: Download reviewed Whisper model (macOS/Linux)
        if: matrix.label != 'windows-x64'
        shell: bash
        run: |
          set -euo pipefail
          model_dir="${RUNNER_TEMP}/ollamax-whisper-model"
          mkdir -p "$model_dir"
          model="$model_dir/ggml-base.en.bin"
          rm -f "$model"
          curl --fail --location --retry 5 --retry-delay 3 \
            --output "$model" "$WHISPER_MODEL_URL"
          [[ -s "$model" ]] || { echo "Whisper model download is empty" >&2; exit 1; }
          echo "OLLAMAX_WHISPER_MODEL_PATH=$model" >> "$GITHUB_ENV"

      - name: Download reviewed Whisper model (Windows x64)
        if: matrix.label == 'windows-x64'
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:RUNNER_TEMP "ollamax-whisper-model"
          New-Item -ItemType Directory -Force -Path $modelDir | Out-Null
          $model = Join-Path $modelDir "ggml-base.en.bin"
          Remove-Item -Force -ErrorAction SilentlyContinue $model
          curl.exe --fail --location --retry 5 --retry-delay 3 --output $model $env:WHISPER_MODEL_URL
          if (-not (Test-Path $model) -or (Get-Item $model).Length -le 0) {
            throw "Whisper model download is empty"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "OLLAMAX_WHISPER_MODEL_PATH=$model"

      - name: Stage verified bundled Whisper runtime
        working-directory: desktop-app
        env:
          # Guarded by the script so a normal `npm run dist` can never make a
          # checked-out source manifest claim that it bundles a model.
          OLLAMAX_RELEASE_STAGE_VOICE: "1"
        run: npm run stage-whisper-runtime

      - name: Smoke-test staged whisper-cli (macOS/Linux)
        if: matrix.label != 'windows-x64'
        shell: bash
        run: |
          set -euo pipefail
          "${GITHUB_WORKSPACE}/desktop-app/voice/whisper-cli" -h >/dev/null

      - name: Smoke-test staged whisper-cli (Windows x64)
        if: matrix.label == 'windows-x64'
        shell: pwsh
        run: |
          $runtime = Join-Path $env:GITHUB_WORKSPACE "desktop-app/voice/whisper-cli.exe"
          & $runtime -h | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "staged whisper-cli.exe failed its local smoke test" }

      - name: Package app with verified bundled Whisper runtime
        working-directory: desktop-app
        env:
          npm_config_python: python
          OLLAMAX_REQUIRE_BUNDLED_VOICE: "1"
        run: npm run dist

      - name: Verify macOS ad-hoc signature
        if: matrix.label == 'macos-arm64'
        working-directory: desktop-app
        run: codesign --verify --deep --strict release/mac-arm64/Ollamax.app

      - name: Collect expected installers and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # Keep this contract in lockstep with desktop-app/package.json and
          # website/src/lib/downloads.ts. A successful electron-builder command
          # is not sufficient: fail the job when its user-facing installers are
          # absent or empty, rather than publishing an empty artifact upload.
          # Electron Builder renders Linux's architecture differently for each
          # package format (`x86_64` for AppImage, `amd64` for deb). Stage both
          # under the stable public `x64` names used by the website, docs, and
          # checksum contract instead of leaking target-specific names.
          case "${{ matrix.label }}" in
            macos-arm64)
              sources=(
                "Ollamax-macos-arm64.dmg"
                "Ollamax-macos-arm64.zip"
              )
              installers=("${sources[@]}")
              ;;
            windows-x64)
              sources=(
                "Ollamax-windows-x64-setup.exe"
                "Ollamax-windows-x64-portable.exe"
              )
              installers=("${sources[@]}")
              ;;
            linux-x64)
              sources=(
                "Ollamax-linux-x86_64.AppImage"
                "Ollamax-linux-amd64.deb"
              )
              installers=(
                "Ollamax-linux-x64.AppImage"
                "Ollamax-linux-x64.deb"
              )
              ;;
            *)
              echo "unknown release matrix label: ${{ matrix.label }}" >&2
              exit 1
              ;;
          esac

          for index in "${!installers[@]}"; do
            source="desktop-app/release/${sources[$index]}"
            installer="${installers[$index]}"
            if [[ ! -s "$source" ]]; then
              echo "expected installer is missing or empty: $source" >&2
              find desktop-app/release -type f -exec ls -lh {} \; 2>/dev/null || true
              exit 1
            fi
            cp "$source" "dist/$installer"
          done

          ls -la dist
          for installer in "${installers[@]}"; do
            if command -v sha256sum >/dev/null 2>&1; then
              ( cd dist && sha256sum "$installer" > "$installer.sha256" )
            else
              ( cd dist && shasum -a 256 "$installer" > "$installer.sha256" )
            fi
          done

      # Attach to the BASE version draft (strip the `app-` prefix). The source
      # release publishes it only after every desktop and CLI asset is present.
      - id: ver
        if: startsWith(github.ref, 'refs/tags/app-v')
        shell: bash
        run: echo "tag=${GITHUB_REF_NAME#app-}" >> "$GITHUB_OUTPUT"

      - name: Attach verified installers to the release draft
        if: startsWith(github.ref, 'refs/tags/app-v')
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: main
          draft: true
          make_latest: false
          name: Ollamax ${{ steps.ver.outputs.tag }}
          body: |
            Standalone desktop app only (UNSIGNED, ad-hoc-signed, Sattva-style).
            The matching source `v*` workflow adds the CLI/VS Code bundles and
            publishes this draft only after the full asset contract passes.
            macOS first launch: right-click the app → Open → Open (not
            code-signed yet). Verify against the matching .sha256. This release
            workflow stages a verified local Whisper runtime; Ollama is the
            default local runtime (https://ollama.com/download).

            ${{ needs.prepare-public-release.outputs.provenance_marker }}
          files: |
            dist/*
          fail_on_unmatched_files: true
