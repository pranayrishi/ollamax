name: release-app

# Builds the STANDALONE desktop app (Electron shell around the forge engine,
# modeled on the Sattva AI app) and publishes UNSIGNED installers to the public
# releases repo. A pushed `app-v*` tag builds and publishes; a manual run is
# build-only so it cannot accidentally attach artifacts to an unintended tag.
#
# Unsigned (ad-hoc, Sattva-style) this round — see desktop-app/scripts/afterPack.js
# and the report. Signing + notarization is the future paid step.
#
# Requires the same RELEASES_REPO_TOKEN secret as release.yml (cross-repo publish).

on:
  push:
    tags: ["app-v*"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RELEASES_REPO: pranayrishi/ollamax-releases

jobs:
  build:
    name: app (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-latest
            label: linux-x64
    steps:
      - uses: actions/checkout@v4

      - name: Assert the macOS artifact is built on Apple Silicon
        if: matrix.label == 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          [[ "$arch" == "arm64" ]] || {
            echo "expected an arm64 macOS runner for Ollamax-macos-arm64, got $arch" >&2
            exit 1
          }

      - name: Build the forge engine (bundled into the app)
        uses: dtolnay/rust-toolchain@stable
      - name: Test the bundled forge engine
        run: cargo test --locked --all-targets
      - run: cargo build --release --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # node-pty (the integrated terminal) is a native module rebuilt by node-gyp.
      # The runners ship Python 3.12+, which removed `distutils` → node-gyp fails
      # ("No module named 'distutils'"). Pin Python 3.11 (still has distutils) so
      # the native rebuild succeeds on macOS/Windows.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install + package the app (prepare.mjs stages the engine + UI)
        working-directory: desktop-app
        env:
          # `python` resolves to the pinned 3.11 on all runners (setup-python).
          npm_config_python: python
        run: |
          npm ci
          npm run dist

      - name: Verify macOS ad-hoc signature
        if: matrix.label == 'macos-arm64'
        working-directory: desktop-app
        run: codesign --verify --deep --strict release/mac-arm64/Ollamax.app

      - name: Collect expected installers and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # Keep this contract in lockstep with desktop-app/package.json and
          # website/src/lib/downloads.ts. A successful electron-builder command
          # is not sufficient: fail the job when its user-facing installers are
          # absent or empty, rather than publishing an empty artifact upload.
          case "${{ matrix.label }}" in
            macos-arm64)
              expected=(
                "Ollamax-macos-arm64.dmg"
                "Ollamax-macos-arm64.zip"
              )
              ;;
            windows-x64)
              expected=(
                "Ollamax-windows-x64-setup.exe"
                "Ollamax-windows-x64-portable.exe"
              )
              ;;
            linux-x64)
              expected=(
                "Ollamax-linux-x64.AppImage"
                "Ollamax-linux-x64.deb"
              )
              ;;
            *)
              echo "unknown release matrix label: ${{ matrix.label }}" >&2
              exit 1
              ;;
          esac

          for installer in "${expected[@]}"; do
            source="desktop-app/release/$installer"
            if [[ ! -s "$source" ]]; then
              echo "expected installer is missing or empty: $source" >&2
              find desktop-app/release -type f -exec ls -lh {} \; 2>/dev/null || true
              exit 1
            fi
            cp "$source" "dist/$installer"
          done

          ls -la dist
          for installer in "${expected[@]}"; do
            if command -v sha256sum >/dev/null 2>&1; then
              ( cd dist && sha256sum "$installer" > "$installer.sha256" )
            else
              ( cd dist && shasum -a 256 "$installer" > "$installer.sha256" )
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish app installers
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/app-v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: app-*
          path: dist
          merge-multiple: true
      # Publish onto the BASE version release (strip the `app-` prefix) so the app
      # installers live alongside everything else on a single "latest" release —
      # keeps the website's releases/latest/download/<asset> URLs working.
      - id: ver
        run: echo "tag=${GITHUB_REF_NAME#app-}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Ollamax ${{ steps.ver.outputs.tag }}
          body: |
            Standalone desktop app (UNSIGNED, ad-hoc-signed, Sattva-style) +
            CLI bundles. macOS first launch: right-click the app → Open → Open
            (not code-signed yet). Verify against the matching .sha256. Bundles
            the forge engine; Ollama required (https://ollama.com/download).
          files: |
            dist/*
          fail_on_unmatched_files: true
