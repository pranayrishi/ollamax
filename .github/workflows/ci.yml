name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Opt into Node.js 24 for JS-based actions. The deprecation of Node.js 20
  # in GitHub runners (June 2026) flags actions/checkout@v4 and
  # actions/cache@v4 even though those are the latest versions — they
  # internally still bundle a Node 20 runtime. Setting this env var forces
  # the runner to execute them on Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # The formatter gate intentionally checks only Rust files introduced
          # or changed by this push/PR. The established repository has legacy
          # formatting drift; new code must still be formatted without turning
          # an unrelated mass-reformat into a release prerequisite.
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting of touched Rust files
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            git ls-files '*.rs' > /tmp/rustfmt-files
          else
            git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$GITHUB_SHA" -- '*.rs' > /tmp/rustfmt-files
          fi
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            # Do not recursively format unrelated child modules when the crate
            # root itself is in the changed-file list.
            rustfmt --edition 2021 --config skip_children=true --check "$file"
          done < /tmp/rustfmt-files

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --locked --all-targets --verbose

      - name: install.sh dry-run
        if: runner.os != 'Windows'
        run: ./install.sh --dry-run --prefix /tmp/forge-ci

  desktop:
    name: desktop validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the bundled forge engine
        run: cargo build --release --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install and test desktop sources
        working-directory: desktop-app
        run: |
          npm ci
          npm test
          npm run validate-runtime
          npm run prepare-assets
          node --check main.js
          node --check preload.js
          node --check lib/attachment-preview.js
          node --check lib/desktop-auth.js
          node --check lib/desktop-security.js
          node --check lib/workspace-paths.js
          node --check spatial-preload.js
          node --check renderer/bridge.js
          node --check renderer/hub-bridge.js
          node --check renderer/hub.js
          node --check renderer/desktop-points.js
          node --check renderer/desktop-voice.js
          node --check renderer/desktop-spatial.js
          node --check renderer/spatial-overlay.js

      # `--dir` runs Electron Builder's afterPack hook without producing an
      # installer. That hook checks the actual staged Resources directory.
      - name: Smoke-test staged desktop package contents
        working-directory: desktop-app
        run: npx electron-builder --linux dir --publish never

  extension:
    name: editor extension validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test and package the VS Code extension
        working-directory: editor-integrations/forge-vscode
        run: |
          node --test src/external-url.test.js src/workspace-preview-paths.test.js
          node --check src/auth.js
          node --check src/hub.js
          node --check src/chatViewProvider.js
          node --check src/workspace-preview-paths.js
          npx --yes @vscode/vsce@3 package --no-dependencies --allow-missing-repository -o /tmp/forge-vscode.vsix

  website:
    name: website validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install, test, typecheck, and build website
        working-directory: website
        env:
          AUTH_SECRET: ci-auth-secret-at-least-thirty-two-characters
          APP_JWT_SECRET: ci-app-jwt-secret-at-least-thirty-two-characters
          AUTH_GITHUB_ID: ci-github-id
          AUTH_GITHUB_SECRET: ci-github-secret
          AUTH_GOOGLE_ID: ci-google-id
          AUTH_GOOGLE_SECRET: ci-google-secret
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ollamax_ci
          NEXT_PUBLIC_SITE_URL: https://ci.ollamax.invalid
        run: |
          npm ci
          npm test
          npm run typecheck
          npm run build
