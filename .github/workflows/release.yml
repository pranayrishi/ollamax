name: release

# Triggered by pushing a `v*` tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
#
# Builds the `forge` binary natively on each OS (no cross-compilation, so we never
# ship a binary that has never run on its target), assembles a per-OS BUNDLE
# (forge + the VS Code .vsix panel + an install script + first-run README), and
# publishes the bundles + SHA-256 checksums to a GitHub Release.
#
# Each verified runner uploads directly to a release draft. This deliberately
# avoids GitHub Actions' intermediate artifact storage: a full quota must not
# prevent otherwise verified installers from being published. `max-parallel: 1`
# keeps the draft updates serialized; a final job publishes it only after every
# desktop and CLI asset is present, so `releases/latest` never exposes a partial
# platform set.
#
# UNSIGNED this round — the bundles carry first-run instructions for the OS
# "unidentified developer" warnings (see desktop/bundle/README-FIRST.md).
#
# Cross-repo publish: source is private (pranayrishi/ollamax); binaries are
# published to the PUBLIC pranayrishi/ollamax-releases so anonymous website
# visitors can download them. That requires a PAT (see below).
#
# REQUIRED SECRET (owner): RELEASES_REPO_TOKEN — a fine-grained PAT with
#   Contents: Read and write  on  pranayrishi/ollamax-releases.
#   Add it under pranayrishi/ollamax → Settings → Secrets → Actions.
#
# PREREQUISITE (already done): the releases repo must have at least one commit on
#   its default branch so the cross-repo Releases API has a commit to tag — it was
#   seeded with a README. Don't delete that or the first publish will 422.
#
# NOTE: workflow_dispatch is BUILD-ONLY (the publish job is gated on a v* tag), so
#   a green manual run does NOT prove the publish path. To dry-run the real
#   cross-repo publish + token, push a throwaway tag (e.g. v0.0.1-test), check the
#   release in ollamax-releases, then delete that tag/release.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RELEASES_REPO: pranayrishi/ollamax-releases

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # GitHub Release mutations are intentionally serialized. The matrix is
      # still native per OS; only publication waits for the preceding platform.
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            ext: tar.gz
          # NOTE: Intel macOS (macos-13 / x86_64) is intentionally NOT built —
          # macos-13 Intel runners are starved on this PRIVATE repo and left the
          # publish job hanging indefinitely. Intel macOS stays "coming soon" in
          # the download UI. Re-add this entry if the build moves to a public
          # repo (free, available Intel runners) or once signing lands.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            ext: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Package the VS Code extension (.vsix)
        working-directory: editor-integrations/forge-vscode
        shell: bash
        # Pack it locally on each native runner so every bundle is self-contained
        # and the release does not depend on Actions artifact storage.
        run: npx --yes @vscode/vsce@3 package --no-dependencies --allow-missing-repository -o "$GITHUB_WORKSPACE/forge-vscode.vsix"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}

      # A release binary is not enough evidence that the target is usable. Run
      # the complete unit + integration suite on every native release runner,
      # including Windows, before assembling an artifact for publication.
      - name: Run Rust test suite
        run: cargo test --locked --all-targets

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/forge || true

      - name: Smoke-test the binary (unix)
        if: runner.os != 'Windows'
        run: target/${{ matrix.target }}/release/forge --version

      - name: Smoke-test the binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& ".\target\${{ matrix.target }}\release\forge.exe" --version'

      - name: Assemble bundle + checksum
        shell: bash
        run: |
          set -euo pipefail
          name="ollama-forge-${{ matrix.label }}"
          mkdir -p "stage/$name" dist
          cp forge-vscode.vsix "stage/$name/"
          cp desktop/bundle/README-FIRST.md "stage/$name/"
          cp LICENSE "stage/$name/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/forge.exe" "stage/$name/forge.exe"
            cp desktop/bundle/install.ps1 "stage/$name/install.ps1"
            ( cd stage && 7z a -tzip "../dist/$name.zip" "$name" >/dev/null )
          else
            cp "target/${{ matrix.target }}/release/forge" "stage/$name/forge"
            cp desktop/bundle/install.sh "stage/$name/install.sh"
            chmod +x "stage/$name/install.sh" "stage/$name/forge"
            tar -czf "dist/$name.tar.gz" -C stage "$name"
          fi
          # Portable SHA-256 sidecar.
          archive="dist/$name.${{ matrix.ext }}"
          if command -v sha256sum >/dev/null 2>&1; then
            ( cd dist && sha256sum "$name.${{ matrix.ext }}" > "$name.${{ matrix.ext }}.sha256" )
          else
            ( cd dist && shasum -a 256 "$name.${{ matrix.ext }}" > "$name.${{ matrix.ext }}.sha256" )
          fi
          ls -la dist

      - name: Publish the verified platform bundle directly
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          # The tag lives in the public releases repository, not this source
          # repository, so it must target a commit that exists there.
          target_commitish: main
          draft: true
          make_latest: false
          name: Ollama-Forge ${{ github.ref_name }}
          body: |
            Unsigned cross-platform bundles (forge CLI + VS Code panel + setup script).

            Smoothest install (no Gatekeeper/SmartScreen warning):
              macOS/Linux:  curl -fsSL https://github.com/pranayrishi/ollamax-releases/releases/latest/download/install.sh | sh
              Windows:      irm https://github.com/pranayrishi/ollamax-releases/releases/latest/download/install.ps1 | iex

            Or download a bundle below and verify it against its `.sha256` (first-run
            notes inside each bundle). Requires a local Ollama daemon (https://ollama.com/download).
          files: |
            dist/ollama-forge-${{ matrix.label }}.${{ matrix.ext }}
            dist/ollama-forge-${{ matrix.label }}.${{ matrix.ext }}.sha256
          fail_on_unmatched_files: true

      - name: Publish shared installers and the VS Code panel
        if: startsWith(github.ref, 'refs/tags/v') && matrix.label == 'linux-x64'
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          target_commitish: main
          draft: true
          make_latest: false
          name: Ollama-Forge ${{ github.ref_name }}
          files: |
            forge-vscode.vsix
            desktop/install.sh
            desktop/install.ps1
          fail_on_unmatched_files: true

  publish:
    name: publish complete release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Verify the complete draft asset contract
        id: contract
        shell: bash
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          response="$(mktemp)"
          code="$(curl -sS -o "$response" -w '%{http_code}' \
            -H "Authorization: Bearer ${RELEASES_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${RELEASES_REPO}/releases?per_page=100")"
          [[ "$code" == 200 ]] || {
            echo "could not list releases for ${RELEASES_REPO}, got HTTP $code" >&2
            sed -n '1,80p' "$response" >&2
            exit 1
          }
          release_id="$(python3 - "$response" "$GITHUB_REF_NAME" <<'PY'
          import json
          import sys

          releases = json.load(open(sys.argv[1], encoding="utf-8"))
          matches = [release for release in releases if release.get("tag_name") == sys.argv[2]]
          if len(matches) != 1:
              raise SystemExit(
                  f"expected exactly one draft release for {sys.argv[2]}, found {len(matches)}"
              )
          release = matches[0]
          if not release.get("draft"):
              raise SystemExit("refusing to publish: the target release is not a draft")

          expected = {
              "Ollamax-macos-arm64.dmg",
              "Ollamax-macos-arm64.dmg.sha256",
              "Ollamax-macos-arm64.zip",
              "Ollamax-macos-arm64.zip.sha256",
              "Ollamax-windows-x64-setup.exe",
              "Ollamax-windows-x64-setup.exe.sha256",
              "Ollamax-windows-x64-portable.exe",
              "Ollamax-windows-x64-portable.exe.sha256",
              "Ollamax-linux-x64.AppImage",
              "Ollamax-linux-x64.AppImage.sha256",
              "Ollamax-linux-x64.deb",
              "Ollamax-linux-x64.deb.sha256",
              "ollama-forge-macos-arm64.tar.gz",
              "ollama-forge-macos-arm64.tar.gz.sha256",
              "ollama-forge-windows-x64.zip",
              "ollama-forge-windows-x64.zip.sha256",
              "ollama-forge-linux-x64.tar.gz",
              "ollama-forge-linux-x64.tar.gz.sha256",
              "forge-vscode.vsix",
              "install.sh",
              "install.ps1",
          }
          assets = {asset.get("name"): asset for asset in release.get("assets", [])}
          missing = sorted(name for name in expected if name not in assets)
          empty = sorted(name for name in expected if name in assets and not assets[name].get("size"))
          if missing or empty:
              raise SystemExit(f"draft asset contract failed; missing={missing}, empty={empty}")
          release_id = release.get("id")
          if not isinstance(release_id, int):
              raise SystemExit("draft release did not include a numeric id")
          print(release_id)
          PY
          )"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Publish the complete verified draft
        shell: bash
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          RELEASE_ID: ${{ steps.contract.outputs.release_id }}
        run: |
          set -euo pipefail
          payload="$(mktemp)"
          python3 - <<'PY' > "$payload"
          import json
          import os

          print(json.dumps({
              "draft": False,
              "make_latest": "true",
              "name": f"Ollamax {os.environ['GITHUB_REF_NAME']}",
              "body": (
                  "Ollamax desktop apps, CLI bundles, and the VS Code panel. Every\n"
                  "platform artifact was built and tested natively before this release\n"
                  "was published. Desktop installers are unsigned; verify the matching\n"
                  "SHA-256 sidecar before opening them. Ollama is required:\n"
                  "https://ollama.com/download"
              ),
          }))
          PY
          response="$(mktemp)"
          code="$(curl -sS -o "$response" -w '%{http_code}' -X PATCH \
            -H "Authorization: Bearer ${RELEASES_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'Content-Type: application/json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            --data-binary "@$payload" \
            "https://api.github.com/repos/${RELEASES_REPO}/releases/${RELEASE_ID}")"
          [[ "$code" == 200 ]] || {
            echo "could not publish verified release ${RELEASE_ID}, got HTTP $code" >&2
            sed -n '1,80p' "$response" >&2
            exit 1
          }
          python3 - "$response" "$GITHUB_REF_NAME" <<'PY'
          import json
          import sys

          release = json.load(open(sys.argv[1], encoding="utf-8"))
          if release.get("draft") or release.get("tag_name") != sys.argv[2]:
              raise SystemExit("release publish response did not describe the expected public tag")
          PY
