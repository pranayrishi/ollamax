name: release-fork

# Builds the Code-OSS FORK app (VS Code-based, with the forge-vscode extension as
# a built-in + the bundled forge engine) and publishes it to the public releases
# repo. This is the real "VS Code format" app — distinct from the Electron
# desktop-app (release-app.yml). Trigger: push a `fork-v*` tag, or run manually.
#
# The VS Code build is heavy (~15 GB disk, wants an 8 GB Node heap, 20-40 min)
# across the active macOS, Linux, and Windows jobs and may need iteration or a
# larger runner.
# Published under a DISTINCT name (Ollamax-code-oss-*) so it does NOT clobber the
# working Electron download while we validate it.
#
# Requires the RELEASES_REPO_TOKEN secret (cross-repo publish), same as release-app.yml.

on:
  push:
    tags: ["fork-v*"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RELEASES_REPO: pranayrishi/ollamax-releases

jobs:
  fork-macos:
    name: fork (macos-arm64)
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (for the bundled forge engine)
        uses: dtolnay/rust-toolchain@stable

      # The VS Code checkout pins Node via .nvmrc (1.95.3 -> 20.18.0). node-gyp
      # needs Python 3.11 (3.12 dropped distutils).
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m pip install --quiet setuptools || true

      - name: Show free disk (the fork build is large)
        run: df -h /

      - name: Build the Code-OSS fork (clone + rebrand + bundle + gulp)
        env:
          RUN_REAL: "1"
          # Authenticate vscode's postinstall downloads (@vscode/ripgrep) to dodge
          # GitHub's unauthenticated 403 rate limit. secrets are valid at step level.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          npm_config_python: python3.11
        run: bash desktop/scripts/bootstrap.sh

      - name: Locate the built .app
        id: app
        run: |
          set -euo pipefail
          APP="$(find "$PWD/desktop" -maxdepth 2 -name '*.app' -type d | head -1)"
          [ -n "$APP" ] || { echo "no .app produced"; find "$PWD/desktop" -maxdepth 2 -type d | head -50; exit 1; }
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "found app: $APP"

      - name: Ad-hoc codesign (unsigned, Gatekeeper right-click-Open)
        run: |
          codesign --force --deep --sign - "${{ steps.app.outputs.app }}" || true
          codesign --verify --deep --verbose=1 "${{ steps.app.outputs.app }}" || true

      - name: Package .dmg (branded window + first-launch instructions)
        run: |
          set -euo pipefail
          mkdir -p dist
          # Lays out the Finder window with the drag-to-Applications background +
          # one-time first-launch steps. Falls back to a plain .dmg on headless
          # runners where Finder window-scripting isn't available.
          bash desktop/scripts/make-dmg.sh "${{ steps.app.outputs.app }}" dist/Ollamax-code-oss-macos-arm64.dmg
          ( cd dist && shasum -a 256 Ollamax-code-oss-macos-arm64.dmg > Ollamax-code-oss-macos-arm64.dmg.sha256 )
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: fork-macos-arm64
          path: dist/*
          if-no-files-found: warn

      - name: Resolve base release tag
        id: release
        if: startsWith(github.ref, 'refs/tags/fork-v')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#fork-}"
          [[ "$tag" == v* ]] || { echo "invalid fork release tag: $GITHUB_REF_NAME" >&2; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish to the releases repo (distinct name; coexists with Electron app)
        if: startsWith(github.ref, 'refs/tags/fork-v')
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.release.outputs.tag }}
          name: Ollamax ${{ steps.release.outputs.tag }}
          body: |
            Ollamax — the VS Code-based (Code-OSS fork) build with the forge AI
            experience as a built-in. UNSIGNED: macOS first launch → right-click →
            Open. Ollama required. Published alongside the Electron app while the
            fork build is validated.
          files: |
            dist/Ollamax-code-oss-macos-arm64.dmg
            dist/Ollamax-code-oss-macos-arm64.dmg.sha256
          fail_on_unmatched_files: false

  fork-linux:
    name: fork (linux-x64)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m pip install --quiet setuptools || true
      - name: Linux build deps (vscode native modules)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev fakeroot rpm
      - name: Build the Code-OSS fork
        env:
          RUN_REAL: "1"
          # Authenticate vscode's postinstall downloads (@vscode/ripgrep) to dodge
          # GitHub's unauthenticated 403 rate limit. secrets are valid at step level.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          npm_config_python: python
        run: bash desktop/scripts/bootstrap.sh
      - name: Package tarball
        run: |
          set -euo pipefail
          mkdir -p dist
          TREE="$(find "$PWD/desktop" -maxdepth 1 -type d -name 'VSCode-linux-*' | head -1)"
          [ -n "$TREE" ] || { echo "no linux build tree"; ls -la desktop; exit 1; }
          tar -C "$(dirname "$TREE")" -czf dist/Ollamax-linux-x64.tar.gz "$(basename "$TREE")"
          ( cd dist && sha256sum Ollamax-linux-x64.tar.gz > Ollamax-linux-x64.tar.gz.sha256 )
          ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: fork-linux-x64
          path: dist/*
          if-no-files-found: warn
      - name: Resolve base release tag
        id: release
        if: startsWith(github.ref, 'refs/tags/fork-v')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#fork-}"
          [[ "$tag" == v* ]] || { echo "invalid fork release tag: $GITHUB_REF_NAME" >&2; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Publish to the releases repo
        if: startsWith(github.ref, 'refs/tags/fork-v')
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.release.outputs.tag }}
          name: Ollamax ${{ steps.release.outputs.tag }}
          files: |
            dist/Ollamax-linux-x64.tar.gz
            dist/Ollamax-linux-x64.tar.gz.sha256
          fail_on_unmatched_files: false

  fork-windows:
    name: fork (windows-x64)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # node-gyp on windows-latest can't auto-find VS 2022; this sets up the MSVC
      # dev environment so vscode's native-module compilation succeeds.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build the Code-OSS fork
        shell: bash
        env:
          RUN_REAL: "1"
          # Authenticate vscode's postinstall downloads (@vscode/ripgrep) to dodge
          # GitHub's unauthenticated 403 rate limit. secrets are valid at step level.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          npm_config_python: python
          npm_config_msvs_version: "2022"
        run: bash desktop/scripts/bootstrap.sh
      - name: Package zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          DIST="$PWD/dist"
          TREE="$(find "$PWD/desktop" -maxdepth 1 -type d -name 'VSCode-win32-*' | head -1)"
          [ -n "$TREE" ] || { echo "no windows build tree"; ls -la desktop; exit 1; }
          ( cd "$(dirname "$TREE")" && 7z a -tzip "$DIST/Ollamax-windows-x64.zip" "$(basename "$TREE")" >/dev/null )
          ( cd dist && sha256sum Ollamax-windows-x64.zip > Ollamax-windows-x64.zip.sha256 )
          ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: fork-windows-x64
          path: dist/*
          if-no-files-found: warn
      - name: Resolve base release tag
        id: release
        if: startsWith(github.ref, 'refs/tags/fork-v')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#fork-}"
          [[ "$tag" == v* ]] || { echo "invalid fork release tag: $GITHUB_REF_NAME" >&2; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Publish to the releases repo
        if: startsWith(github.ref, 'refs/tags/fork-v')
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.release.outputs.tag }}
          name: Ollamax ${{ steps.release.outputs.tag }}
          files: |
            dist/Ollamax-windows-x64.zip
            dist/Ollamax-windows-x64.zip.sha256
          fail_on_unmatched_files: false
